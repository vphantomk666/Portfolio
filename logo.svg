<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#020826" />
      <stop offset="100%" stop-color="#000105" />
    </radialGradient>

    <!-- Logo Letter V Gradient -->
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7026ff" />
      <stop offset="100%" stop-color="#ff00e5" />
    </linearGradient>

    <!-- Swoosh Gradient -->
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="60%" stop-color="#b826ff" />
      <stop offset="100%" stop-color="#ff00c8" />
    </linearGradient>
  </defs>

  <!-- Background -->

  <g transform="translate(20, 10)">
    <!-- Back part of the swoosh (behind the left wing of V) -->
    <path d="M 520 230 C 670 230, 690 310, 520 340 C 470 350, 410 350, 360 338 L 375 315 C 420 325, 470 325, 510 315 C 620 290, 610 248, 520 248 Z" fill="url(#swooshGrad)" />

    <!-- The Main 'V' Shape -->
    <!-- Outer boundary of the V -->
    <path d="M 210 135 
             L 330 135 
             C 365 210, 375 240, 400 300
             C 415 260, 435 210, 470 135 
             L 550 135 
             L 380 435 
             Z" 
          fill="url(#vGrad)" />
          
    <!-- Inner cutout of the V to create the hollow/border look -->
    <path d="M 252 153 
             L 312 153 
             L 382 315
             L 405 260
             C 425 215, 445 175, 456 153
             L 512 153 
             L 403 380
             Z" 
          fill="#020826" />

    <!-- Front part of the swoosh (in front of the right side/bottom of V) -->
    <path d="M 220 335 C 240 355, 300 365, 362 338 L 387 360 C 310 385, 240 380, 220 335 Z" fill="url(#swooshGrad)" />
  </g>
</svg>
